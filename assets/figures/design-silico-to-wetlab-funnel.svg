<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="In-silico to wet-lab attrition funnel">
<text x="40.0" y="28.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">IN SILICO  →  WET LAB</text>
<text x="40" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#17181b">~10,000 backbones generated</text>
<rect x="40" y="52" width="560" height="30" rx="3" fill="#eaf0f6" stroke="#cfcdc4" stroke-width="1"/>
<text x="40" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#17181b">hundreds pass the self-consistency filter</text>
<rect x="40" y="102" width="360" height="30" rx="3" fill="#274b6d" stroke="#cfcdc4" stroke-width="1"/>
<text x="40" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#17181b">~10–40% of ordered designs bind (target-dependent)</text>
<rect x="40" y="152" width="160" height="30" rx="3" fill="#9c6b12" stroke="#cfcdc4" stroke-width="1"/>
<text x="40" y="196" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#17181b">a handful show genuine catalytic function</text>
<rect x="40" y="202" width="60" height="30" rx="3" fill="#b04a3f" stroke="#cfcdc4" stroke-width="1"/>
<text x="40" y="256" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#6a6d73">Headline success rates are quoted at a late, narrow slice; end-to-end yield is far smaller.</text>
</svg>