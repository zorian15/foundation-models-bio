<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="three rungs of perturbation generalization from easy to open frontier">
<text x="30.0" y="26.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">GENERALIZATION GETS HARDER</text>
<rect x="30.0" y="170.0" width="185.0" height="44.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="122.5" y="195.8" font-size="11" font-weight="600" text-anchor="middle" fill="#17181b">Seen perturbation</text>
<text x="122" y="232" font-size="11" fill="#6a6d73" text-anchor="middle">linear baselines already strong</text>
<rect x="230.0" y="125.0" width="185.0" height="44.0" rx="6" fill="#f4f3ee" stroke="#cfcdc4"/>
<text x="322.5" y="150.8" font-size="11" font-weight="600" text-anchor="middle" fill="#17181b">Unseen single gene</text>
<text x="322" y="187" font-size="11" fill="#6a6d73" text-anchor="middle">deep models roughly tie the mean</text>
<rect x="430.0" y="80.0" width="185.0" height="44.0" rx="6" fill="#f4f3ee" stroke="#b04a3f"/>
<text x="522.5" y="105.8" font-size="11" font-weight="600" text-anchor="middle" fill="#17181b">Combinatorial or new cell type</text>
<text x="522" y="142" font-size="11" fill="#6a6d73" text-anchor="middle">open frontier</text>
</svg>