<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="perturbation menu nudging a cell from state A to state B">
<defs><marker id="csp1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<defs><marker id="csp2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b04a3f"/></marker></defs>
<text x="30.0" y="28.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">MENU OF PERTURBATIONS</text>
<rect x="30.0" y="42.0" width="190.0" height="34.0" rx="6" fill="#eaf0f6" stroke="#cfcdc4"/>
<text x="125.0" y="63.2" font-size="12" font-weight="400" text-anchor="middle" fill="#17181b">Knock out a gene</text>
<rect x="30.0" y="88.0" width="190.0" height="34.0" rx="6" fill="#eaf0f6" stroke="#cfcdc4"/>
<text x="125.0" y="109.2" font-size="12" font-weight="400" text-anchor="middle" fill="#17181b">Turn a gene on (CRISPRa)</text>
<rect x="30.0" y="134.0" width="190.0" height="34.0" rx="6" fill="#eaf0f6" stroke="#cfcdc4"/>
<text x="125.0" y="155.2" font-size="12" font-weight="400" text-anchor="middle" fill="#17181b">Wire a gene circuit</text>
<path d="M 228 105 L 285 105" stroke="#274b6d" stroke-width="2" fill="none" marker-end="url(#csp1)"/>
<rect x="290.0" y="80.0" width="120.0" height="50.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="350.0" y="109.5" font-size="13" font-weight="600" text-anchor="middle" fill="#17181b">Cell state A</text>
<text x="350" y="150" font-size="11" fill="#6a6d73" text-anchor="middle">where the cell is</text>
<path d="M 413 105 L 470 105" stroke="#b04a3f" stroke-width="2" fill="none" marker-end="url(#csp2)"/>
<rect x="475.0" y="80.0" width="130.0" height="50.0" rx="6" fill="#eaf0f6" stroke="#274b6d"/>
<text x="540.0" y="109.5" font-size="13" font-weight="600" text-anchor="middle" fill="#17181b">Cell state B</text>
<text x="540" y="150" font-size="11" fill="#6a6d73" text-anchor="middle">the therapeutic goal</text>
<text x="345" y="196" font-size="12" fill="#3b3d42" text-anchor="middle">Which perturbations move A toward B?</text>
</svg>